<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Care Group Hub</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f5; --bg3: #eeeeee;
    --text: #1a1a1a; --text2: #555; --text3: #888;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
    --purple: #534AB7; --purple-light: #EEEDFE; --purple-dark: #3C3489;
    --teal-light: #E1F5EE; --teal-dark: #085041;
    --amber: #FAEEDA; --amber-mid: #EF9F27; --amber-dark: #633806; --amber-deep: #412402;
    --red: #E24B4A; --red-light: #FCEBEB;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e; --bg2: #2a2a2a; --bg3: #333;
      --text: #f0f0f0; --text2: #aaa; --text3: #666;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --purple-light: #2e2a5a; --purple-dark: #b0aaff;
      --teal-light: #0e2e22; --teal-dark: #7ddbb8;
      --amber: #2e2010; --amber-dark: #f5c47a; --amber-deep: #fde8b0;
      --red-light: #2e1010;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
  .app { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
  .header h1 { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .header h1 i { color: var(--purple); }
  .header-sub { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .btn { font-size: 13px; padding: 7px 14px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background .15s; }
  .btn:hover { background: var(--bg3); }
  .btn-primary { background: var(--purple); color: #fff; border-color: var(--purple); }
  .btn-primary:hover { opacity: .88; }
  .btn-admin-on { border-color: var(--purple); color: var(--purple); font-weight: 600; }
  .controls { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .controls input, .controls select { font-size: 14px; padding: 8px 12px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; }
  .controls input { flex: 1; min-width: 160px; }
  .controls input:focus, .controls select:focus { border-color: var(--purple); }
  .tab-bar { display: flex; gap: 4px; margin-bottom: 1.25rem; background: var(--bg3); border-radius: var(--radius); padding: 3px; flex-wrap: wrap; }
  .tab { flex: 1; min-width: 80px; padding: 7px 4px; text-align: center; font-size: 13px; border-radius: 6px; cursor: pointer; color: var(--text2); border: none; background: transparent; transition: background .15s; }
  .tab.active { background: var(--bg); color: var(--text); font-weight: 600; border: 1px solid var(--border); }
  .alert-banner { background: var(--amber); border: 1px solid var(--amber-mid); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
  .alert-title { font-size: 14px; font-weight: 600; color: var(--amber-dark); margin-bottom: .5rem; display: flex; align-items: center; gap: 6px; }
  .alert-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(239,159,39,.3); }
  .alert-item:last-child { border-bottom: none; padding-bottom: 0; }
  .alert-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(239,159,39,.3); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--amber-dark); flex-shrink: 0; }
  .badge { font-size: 11px; padding: 2px 9px; border-radius: 999px; font-weight: 600; white-space: nowrap; }
  .badge-today { background: var(--red); color: #fff; }
  .badge-month { background: var(--amber-mid); color: var(--amber-deep); }
  .badge-role { background: var(--purple-light); color: var(--purple-dark); font-size: 11px; padding: 2px 7px; border-radius: 999px; }
  .badge-group { background: var(--teal-light); color: var(--teal-dark); font-size: 11px; padding: 2px 7px; border-radius: 999px; }
  .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .member-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; }
  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .av-0{background:#EEEDFE;color:#3C3489} .av-1{background:#E1F5EE;color:#085041}
  .av-2{background:#E6F1FB;color:#0C447C} .av-3{background:#FAECE7;color:#712B13}
  .av-4{background:#EAF3DE;color:#27500A} .av-5{background:#FBEAF0;color:#72243E}
  .av-6{background:#FAEEDA;color:#633806} .av-7{background:#FCEBEB;color:#791F1F}
  .card-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .card-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 3px; }
  .date-rows { display: flex; flex-direction: column; gap: 5px; }
  .date-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .date-row i { font-size: 13px; color: var(--text3); flex-shrink: 0; }
  .date-val { margin-left: auto; color: var(--text); font-size: 12px; }
  .milestone-pill { display: inline-flex; align-items: center; gap: 4px; background: var(--teal-light); color: var(--teal-dark); font-size: 11px; padding: 2px 8px; border-radius: 999px; margin-top: 5px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .month-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; padding: 12px 0 4px; border-bottom: 1px solid var(--border); margin-bottom: 2px; }
  .list-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .list-row:last-child { border-bottom: none; }
  .list-info { flex: 1; min-width: 0; }
  .list-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stat-val { font-size: 28px; font-weight: 700; color: var(--purple); }
  .loading { text-align: center; padding: 4rem 1rem; color: var(--text2); font-size: 14px; }
  .loading i { font-size: 36px; display: block; margin-bottom: 12px; color: var(--purple); animation: spin 1.2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: var(--red-light); border: 1px solid var(--red); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem; color: var(--red); font-size: 14px; line-height: 1.6; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }
  .empty i { font-size: 36px; display: block; margin-bottom: 10px; color: var(--text3); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 320px; border: 1px solid var(--border2); }
  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 1rem; }
  .form-group { margin-bottom: .875rem; }
  .form-group label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
  .form-group input, .form-group select { width: 100%; font-size: 14px; padding: 8px 12px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; }
  .form-group input:focus { border-color: var(--purple); }
  .pin-wrap { display: flex; gap: 10px; justify-content: center; margin: .5rem 0; }
  .pin-digit { width: 52px; height: 56px; font-size: 24px; text-align: center; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; }
  .pin-digit:focus { border-color: var(--purple); }
  .pin-error { color: var(--red); font-size: 12px; text-align: center; margin-top: 6px; display: none; }
  .btn-row { display: flex; gap: 8px; margin-top: 1.25rem; justify-content: flex-end; }
  .bar-row { margin-bottom: 12px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .bar-track { height: 8px; background: var(--bg3); border-radius: 999px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--purple); border-radius: 999px; transition: width .4s; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1><i class="ti ti-heart"></i> Care Group Hub</h1>
      <div class="header-sub" id="month-label"></div>
    </div>
    <div class="header-right">
      <button class="btn" onclick="reloadData()"><i class="ti ti-refresh"></i> Refresh</button>
      <button class="btn" id="admin-btn" onclick="openAdminLogin()"><i class="ti ti-lock"></i> Admin</button>
    </div>
  </div>

  <div id="error-area"></div>
  <div id="alerts-area"></div>

  <div class="controls">
    <input type="text" id="search" placeholder="Cari nama anggota..." oninput="applyFilters()" />
    <select id="group-filter" onchange="applyFilters()">
      <option value="">Semua care group</option>
    </select>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('members',this)">Anggota</button>
    <button class="tab" onclick="switchTab('birthdays',this)">Ulang Tahun</button>
    <button class="tab" onclick="switchTab('anniversaries',this)">Anniversari</button>
    <button class="tab" onclick="switchTab('milestones',this)">Discipleship</button>
    <button class="tab" onclick="switchTab('overview',this)">Ringkasan</button>
  </div>

  <div id="tab-content">
    <div class="loading"><i class="ti ti-loader"></i>Memuat data dari Google Sheets...</div>
  </div>
</div>

<!-- Admin PIN modal -->
<div class="modal-overlay" id="admin-modal">
  <div class="modal">
    <h2><i class="ti ti-lock" style="margin-right:6px;color:var(--purple)"></i>Admin login</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:1rem;">Masukkan PIN 4 digit</p>
    <div class="pin-wrap">
      <input class="pin-digit" type="password" maxlength="1" id="p0" oninput="pinInput(0)" onkeydown="pinKey(event,0)" />
      <input class="pin-digit" type="password" maxlength="1" id="p1" oninput="pinInput(1)" onkeydown="pinKey(event,1)" />
      <input class="pin-digit" type="password" maxlength="1" id="p2" oninput="pinInput(2)" onkeydown="pinKey(event,2)" />
      <input class="pin-digit" type="password" maxlength="1" id="p3" oninput="pinInput(3)" onkeydown="pinKey(event,3)" />
    </div>
    <div class="pin-error" id="pin-error">PIN salah. Coba lagi.</div>
    <div class="btn-row"><button class="btn" onclick="closeModal('admin-modal')">Batal</button></div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRQ9HlZLh8RK7d0fiQdo3XuB1pnNdsIjJdYcFsnJBbH8wZBNzXSGUaRIdfgZH-BKAXYWn6zW9YyvUjJ/pub?output=csv';
const ADMIN_PIN = '1234';
const MONTHS_ID = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const MMAP = {jan:0,feb:1,mar:2,apr:3,mei:4,may:4,jun:5,jul:6,agu:7,aug:7,sep:8,okt:9,oct:9,nov:10,des:11,dec:11};

let allMembers = [], filtered = [], isAdmin = false, activeTab = 'members';

function initials(n) { return (n||'').split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase()||'?'; }
function avColor(n) { let h=0; for(let c of (n||'')) h=(h*31+c.charCodeAt(0))&0xffff; return 'av-'+(h%8); }

function parseDate(s) {
  if (!s || !s.trim()) return null;
  s = s.trim();
  let m;
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) { const d = new Date(+m[3],+m[2]-1,+m[1]); return valid(d,+m[3])?d:null; }
  m = s.match(/^(\d{1,2})-([A-Za-z]{2,4})-(\d{2,4})$/);
  if (m) { const mon=MMAP[m[2].toLowerCase()]; if(mon===undefined) return null; let yr=+m[3]; if(yr<100) yr+=1900; const d=new Date(yr,mon,+m[1]); return valid(d,yr)?d:null; }
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) { const d=new Date(+m[1],+m[2]-1,+m[3]); return valid(d,+m[1])?d:null; }
  return null;
}
function valid(d,yr) { return d instanceof Date && !isNaN(d) && yr>1900 && yr<2100; }
function fmtShort(d) { if(!d) return '—'; return d.getDate()+' '+MONTHS_ID[d.getMonth()].slice(0,3); }
function fmtFull(d) { if(!d) return '—'; return d.getDate()+' '+MONTHS_ID[d.getMonth()]+' '+d.getFullYear(); }
function isThisMonth(d) { if(!d) return false; const n=new Date(); return d.getMonth()===n.getMonth(); }
function isToday(d) { if(!d) return false; const n=new Date(); return d.getMonth()===n.getMonth()&&d.getDate()===n.getDate(); }

function parseCSVLine(line) {
  const r=[]; let cur='',inQ=false;
  for(let i=0;i<line.length;i++) {
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){r.push(cur);cur='';}
    else cur+=c;
  }
  r.push(cur); return r;
}

function dedup(arr) {
  const map={};
  arr.forEach(m => {
    const k=m.name.toLowerCase().trim();
    if(!map[k]||m.raw.Timestamp>map[k].raw.Timestamp) map[k]=m;
  });
  return Object.values(map);
}

async function reloadData() {
  document.getElementById('tab-content').innerHTML='<div class="loading"><i class="ti ti-loader"></i>Memuat data...</div>';
  document.getElementById('error-area').innerHTML='';
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('Gagal mengambil data (status '+res.status+')');
    const text = await res.text();
    const lines = text.split('\n').filter(l=>l.trim());
    const headers = parseCSVLine(lines[0]).map(h=>h.trim());
    const rows = lines.slice(1).map(l=>{
      const vals=parseCSVLine(l); const obj={};
      headers.forEach((h,i)=>obj[h]=(vals[i]||'').trim());
      return obj;
    }).filter(r=>r['Nama Lengkap']&&r['Nama Lengkap'].length>1);

    const members = rows.map(r=>({
      raw: r,
      name: r['Nama Lengkap']||'',
      group: r['Nama Care Group']||'',
      role: r['Peran dalam Care Group']||'',
      gender: r['Jenis Kelamin']||'',
      birthday: parseDate(r['Tanggal Lahir']),
      anniversary: parseDate(r['Tanggal Pernikahan']),
      spouseName: r['Nama Lengkap Pasangan']||'',
      spouseBirthday: parseDate(r['Tanggal Lahir Pasangan']),
      discipleship: r['Kelas Discipleship Journey terakhir yang diikuti.']||'',
      ministry: r['Sedang melayani sebagai']||'',
      marital: r['Status pernikahan']||'',
    }));

    allMembers = dedup(members);
    populateGroupFilter();
    applyFilters();
    renderAlerts(allMembers);
  } catch(e) {
    document.getElementById('error-area').innerHTML=`<div class="error-box">
      <strong><i class="ti ti-alert-circle"></i> Gagal memuat data</strong><br>${e.message}<br>
      <small>Pastikan Google Sheet sudah dipublish: File → Share → Publish to web → CSV → Publish</small>
    </div>`;
    document.getElementById('tab-content').innerHTML='';
  }
}

function populateGroupFilter() {
  const groups=[...new Set(allMembers.map(m=>m.group).filter(Boolean))].sort();
  document.getElementById('group-filter').innerHTML=
    '<option value="">Semua care group</option>'+groups.map(g=>`<option value="${g}">${g}</option>`).join('');
}

function applyFilters() {
  const q=document.getElementById('search').value.toLowerCase();
  const g=document.getElementById('group-filter').value;
  filtered=allMembers.filter(m=>
    (!q||m.name.toLowerCase().includes(q)||(m.group||'').toLowerCase().includes(q))&&
    (!g||m.group===g));
  renderTab();
}

function renderAlerts(members) {
  const events=[];
  members.forEach(m=>{
    if(isThisMonth(m.birthday)) events.push({name:m.name,type:'Ulang Tahun',date:m.birthday,today:isToday(m.birthday)});
    if(isThisMonth(m.anniversary)) events.push({name:m.name,type:'Anniversari Pernikahan',date:m.anniversary,today:isToday(m.anniversary)});
    if(isThisMonth(m.spouseBirthday)&&m.spouseName) events.push({name:m.spouseName+' (pasangan)',type:'Ulang Tahun',date:m.spouseBirthday,today:isToday(m.spouseBirthday)});
  });
  const area=document.getElementById('alerts-area');
  if(!events.length){area.innerHTML='';return;}
  const now=new Date();
  events.sort((a,b)=>a.date.getDate()-b.date.getDate());
  area.innerHTML=`<div class="alert-banner">
    <div class="alert-title"><i class="ti ti-bell"></i> Event bulan ${MONTHS_ID[now.getMonth()]} — ${events.length} orang</div>
    ${events.map(e=>`<div class="alert-item">
      <div class="alert-avatar">${initials(e.name)}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:600;color:var(--amber-deep);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.name}</div>
        <div style="font-size:12px;color:var(--amber-dark);">${e.type} · ${fmtShort(e.date)}</div>
      </div>
      ${e.today?'<span class="badge badge-today">Hari ini!</span>':'<span class="badge badge-month">Bulan ini</span>'}
    </div>`).join('')}
  </div>`;
}

function renderMembers() {
  const el=document.getElementById('tab-content');
  if(!filtered.length){el.innerHTML='<div class="empty"><i class="ti ti-users"></i>Tidak ada anggota ditemukan.</div>';return;}
  el.innerHTML=`<div class="members-grid">${filtered.map(m=>`
    <div class="member-card">
      <div class="card-header">
        <div class="avatar ${avColor(m.name)}">${initials(m.name)}</div>
        <div style="min-width:0;">
          <div class="card-name">${m.name}</div>
          <div class="card-badges">
            ${m.group?`<span class="badge-group">${m.group}</span>`:''}
            ${m.role?`<span class="badge-role">${m.role}</span>`:''}
          </div>
        </div>
      </div>
      <div class="date-rows">
        <div class="date-row"><i class="ti ti-cake"></i>Ulang tahun<span class="date-val">${fmtShort(m.birthday)}</span></div>
        ${m.anniversary?`<div class="date-row"><i class="ti ti-heart"></i>Anniversari<span class="date-val">${fmtShort(m.anniversary)}</span></div>`:''}
        ${m.spouseName?`<div class="date-row"><i class="ti ti-user"></i><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70px;">${m.spouseName}</span><span class="date-val">${fmtShort(m.spouseBirthday)}</span></div>`:''}
        ${m.discipleship&&m.discipleship!=='Belum ikut'?`<div><span class="milestone-pill"><i class="ti ti-award" style="font-size:11px;"></i>${m.discipleship}</span></div>`:''}
      </div>
    </div>`).join('')}</div>`;
}

function renderListByMonth(items, getDate, getLabel) {
  if(!items.length) return '<div class="empty"><i class="ti ti-calendar-off"></i>Tidak ada data.</div>';
  const grouped={};
  items.forEach(item=>{
    const d=getDate(item);
    const key=d?MONTHS_ID[d.getMonth()]:'Tanggal tidak diketahui';
    if(!grouped[key]) grouped[key]=[];
    grouped[key].push(item);
  });
  return MONTHS_ID.filter(k=>grouped[k]).map(key=>`
    <div class="month-label">${key}</div>
    ${grouped[key].sort((a,b)=>getDate(a).getDate()-getDate(b).getDate()).map(item=>{
      const d=getDate(item);
      return `<div class="list-row">
        <div class="avatar ${avColor(item.name)}" style="width:36px;height:36px;font-size:11px;">${initials(item.name)}</div>
        <div class="list-info">
          <div class="list-name">${item.name}</div>
          <div class="list-sub">${getLabel(item)} · ${fmtFull(d)}${item.group?' · '+item.group:''}</div>
        </div>
        ${isToday(d)?'<span class="badge badge-today">Hari ini!</span>':(isThisMonth(d)?'<span class="badge badge-month">Bulan ini</span>':'')}
      </div>`;
    }).join('')}`).join('');
}

function renderBirthdays() {
  const items=filtered.filter(m=>m.birthday);
  const spouses=filtered.filter(m=>m.spouseBirthday&&m.spouseName).map(m=>({name:m.spouseName+' (pasangan '+m.name+')',group:m.group,birthday:m.spouseBirthday}));
  document.getElementById('tab-content').innerHTML=renderListByMonth([...items,...spouses],m=>m.birthday,()=>'Ulang Tahun');
}

function renderAnniversaries() {
  document.getElementById('tab-content').innerHTML=renderListByMonth(
    filtered.filter(m=>m.anniversary),m=>m.anniversary,()=>'Anniversari Pernikahan');
}

function renderMilestones() {
  const items=filtered.filter(m=>m.discipleship&&m.discipleship!=='Belum ikut');
  if(!items.length){document.getElementById('tab-content').innerHTML='<div class="empty"><i class="ti ti-award"></i>Tidak ada milestone tercatat.</div>';return;}
  const grouped={};
  items.forEach(m=>{if(!grouped[m.discipleship]) grouped[m.discipleship]=[]; grouped[m.discipleship].push(m);});
  document.getElementById('tab-content').innerHTML=Object.entries(grouped).map(([kelas,list])=>`
    <div class="month-label">${kelas} (${list.length} orang)</div>
    ${list.map(m=>`<div class="list-row">
      <div class="avatar ${avColor(m.name)}" style="width:36px;height:36px;font-size:11px;">${initials(m.name)}</div>
      <div class="list-info">
        <div class="list-name">${m.name}</div>
        <div class="list-sub">${m.group||''}${m.ministry&&m.ministry!=='Belum melayani'?' · '+m.ministry:''}</div>
      </div>
    </div>`).join('')}`).join('');
}

function renderOverview() {
  const groups=[...new Set(allMembers.map(m=>m.group).filter(Boolean))].sort();
  const thisMonthCount=allMembers.filter(m=>isThisMonth(m.birthday)||isThisMonth(m.anniversary)||isThisMonth(m.spouseBirthday)).length;
  const married=allMembers.filter(m=>m.marital==='Menikah').length;
  const hasDJ=allMembers.filter(m=>m.discipleship&&m.discipleship!=='Belum ikut').length;
  document.getElementById('tab-content').innerHTML=`
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Total anggota</div><div class="stat-val">${allMembers.length}</div></div>
      <div class="stat-card"><div class="stat-label">Care group</div><div class="stat-val">${groups.length}</div></div>
      <div class="stat-card"><div class="stat-label">Event bulan ini</div><div class="stat-val">${thisMonthCount}</div></div>
      <div class="stat-card"><div class="stat-label">Sudah DJ</div><div class="stat-val">${hasDJ}</div></div>
      <div class="stat-card"><div class="stat-label">Sudah menikah</div><div class="stat-val">${married}</div></div>
    </div>
    <div class="month-label" style="margin-bottom:12px;">Anggota per care group</div>
    ${groups.map(g=>{
      const count=allMembers.filter(m=>m.group===g).length;
      const pct=Math.round(count/allMembers.length*100);
      return `<div class="bar-row">
        <div class="bar-label"><span style="font-weight:600;">${g}</span><span style="color:var(--text2);">${count} anggota</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('')}`;
}

function switchTab(tab,el) {
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTab();
}
function renderTab() {
  if(activeTab==='members') renderMembers();
  else if(activeTab==='birthdays') renderBirthdays();
  else if(activeTab==='anniversaries') renderAnniversaries();
  else if(activeTab==='milestones') renderMilestones();
  else if(activeTab==='overview') renderOverview();
}

function openAdminLogin() {
  if(isAdmin){
    isAdmin=false;
    document.getElementById('admin-btn').innerHTML='<i class="ti ti-lock"></i> Admin';
    document.getElementById('admin-btn').classList.remove('btn-admin-on');
    return;
  }
  [0,1,2,3].forEach(i=>document.getElementById('p'+i).value='');
  document.getElementById('pin-error').style.display='none';
  document.getElementById('admin-modal').classList.add('open');
  setTimeout(()=>document.getElementById('p0').focus(),100);
}
function pinInput(i) {
  const v=document.getElementById('p'+i).value;
  if(v&&i<3) document.getElementById('p'+(i+1)).focus();
  if(i===3&&v) checkFullPin();
}
function pinKey(e,i) { if(e.key==='Backspace'&&!document.getElementById('p'+i).value&&i>0) document.getElementById('p'+(i-1)).focus(); }
function checkFullPin() {
  const pin=[0,1,2,3].map(i=>document.getElementById('p'+i).value).join('');
  if(pin.length<4) return;
  if(pin===ADMIN_PIN){
    isAdmin=true; closeModal('admin-modal');
    document.getElementById('admin-btn').innerHTML='<i class="ti ti-lock-open"></i> Admin aktif';
    document.getElementById('admin-btn').classList.add('btn-admin-on');
  } else {
    document.getElementById('pin-error').style.display='block';
    [0,1,2,3].forEach(i=>document.getElementById('p'+i).value='');
    document.getElementById('p0').focus();
  }
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

const now=new Date();
document.getElementById('month-label').textContent=MONTHS_ID[now.getMonth()]+' '+now.getFullYear();
reloadData();
</script>
</body>
</html>
